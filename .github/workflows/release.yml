name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      # NOTE: go.mod currently specifies go 1.25.7 which may not be available
      # on GitHub Actions runners. Adjust go-version below if the workflow fails.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"

          LDFLAGS="-s -w -X github.com/vector76/raymond/internal/version.Version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -o "raymond${EXT}" ./cmd/raymond
          go build -ldflags "${LDFLAGS}" -o "ray${EXT}" ./cmd/ray

          if [ "$GOOS" = "windows" ]; then
            ARCHIVE="raymond-${VERSION}-${GOOS}-${GOARCH}.zip"
            zip "${ARCHIVE}" raymond.exe ray.exe
          else
            ARCHIVE="raymond-${VERSION}-${GOOS}-${GOARCH}.tar.gz"
            tar czf "${ARCHIVE}" raymond ray
          fi

          echo "ASSET=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            dist/*
