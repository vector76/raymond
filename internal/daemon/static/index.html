<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raymond Daemon</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("raymond-theme");
        if (!t) {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header>
    <h1>Raymond Daemon</h1>
    <div class="header-right">
      <span class="status" id="conn-status">Loading...</span>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main>
    <section id="workflows-section">
      <h2>Workflows</h2>
      <div id="workflows"></div>
    </section>

    <section id="active-runs-section">
      <h2>Active Runs</h2>
      <div id="active-runs"></div>
    </section>

    <section id="history-section">
      <h2>Run History</h2>
      <div id="history-runs"></div>
    </section>

    <section id="pending-inputs-section" style="display:none">
      <h2>Pending Inputs</h2>
      <div id="pending-inputs"></div>
    </section>

    <section id="output-section" style="display:none">
      <div id="output-header">
        <h2>Live Output &mdash; <span id="output-run-id"></span></h2>
        <div class="cancel-btn-wrapper">
          <button class="btn btn-danger" id="cancel-btn" style="display:none">Cancel Run</button>
        </div>
      </div>
      <div id="output-log"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
